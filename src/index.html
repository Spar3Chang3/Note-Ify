<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Note-Ify Control Panel</title>
        <link rel="stylesheet" href="./styles.css" />
        <script type="module" src="./main.js" defer></script>
    </head>
    <body>
        <main class="app">
            <section class="settings-modal closed" id="settingsModal">
                <button class="icon-btn fixed" id="settingsClose">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                        class="fixed-x"
                    >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path
                            d="M6.707 5.293l5.293 5.292l5.293 -5.292a1 1 0 0 1 1.414 1.414l-5.292 5.293l5.292 5.293a1 1 0 0 1 -1.414 1.414l-5.293 -5.292l-5.293 5.292a1 1 0 1 1 -1.414 -1.414l5.292 -5.293l-5.292 -5.293a1 1 0 0 1 1.414 -1.414"
                        />
                    </svg>
                </button>
                <h1 class="panel">Settings</h1>
                <div class="panel">
                    <span>Nothing to see here!</span>
                </div>
            </section>

            <header class="topbar">
                <div class="quickpanel">
                    <button class="icon-btn" id="settingsBtn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="settings"
                        >
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path
                                d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065"
                            />
                            <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
                        </svg>
                    </button>
                    <button class="icon-btn">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="config"
                        >
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path
                                d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"
                            />
                            <path d="M13.5 6.5l4 4" />
                        </svg>
                    </button>
                </div>

                <div>
                    <h1>Note-Ify</h1>
                    <p class="subtitle">
                        Automatically take notes on RPG games
                    </p>
                </div>

                <div class="actions">
                    <button id="startBtn" class="btn primary">Start Bot</button>
                    <button id="stopBtn" class="btn danger" disabled>
                        Stop Bot
                    </button>
                    <span id="status" class="status stopped">Stopped</span>
                </div>
            </header>

            <section class="panel">
                <div class="panel-header">
                    <h2>Console Output</h2>
                    <button id="clearBtn" class="btn secondary">Clear</button>
                </div>

                <div id="logWrap" class="log-wrap">
                    <code id="logOutput" class="log-output"></code>
                </div>
            </section>
        </main>
    </body>
</html>
